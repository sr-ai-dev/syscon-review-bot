name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: kj-choi-syscon/syscon-review-bot@v1
        with:
          openai-key: ${{ secrets.OPENAI_API_KEY }}
          # github-token defaults to ${{ github.token }}
          # model: gpt-5-mini       # optional — overrides config.review.model
          # config-path: .github/review-bot.yml   # optional
