# 소비자 레포의 .github/review-bot.yml로 복사해서 사용.
# 모든 항목은 선택사항이며, 미지정 시 코드 내 기본값이 적용된다.

review:
  language: korean              # 리뷰 코멘트 언어
  severity_threshold: medium    # low | medium | high
  # model: gpt-5.4-mini         # 미설정 시 액션 input의 model → GPTClient 기본값 순으로 적용

rules:                          # 내장 9개 룰 ON/OFF. 모두 true가 기본
  architecture: true
  type_safety: true
  code_quality: true
  test_coverage: true
  performance: true
  security: true
  error_handling: true
  refactoring: true
  documentation: true

custom_rules:                   # 팀/레포별 추가 룰. 시스템 프롬프트에 그대로 추가됨
  - "C++ raw pointer 직접 사용 금지, smart pointer(unique_ptr/shared_ptr) 사용"
  - "Python에서 mutable default argument 사용 금지"
  - "asyncio.create_task 반환값은 변수에 보관할 것 (GC로 사라지지 않게)"

ignore:                         # 리뷰 대상에서 제외할 파일
  files:
    - "*.lock"
    - "dist/**"
    - "**/*.generated.*"
  extensions:
    - ".md"
    - ".txt"

approve_criteria:               # 서버사이드 결정 기준
  max_high_issues: 0            # critical 허용 개수 (1+이면 REQUEST_CHANGES)
  max_medium_issues: 3          # warning 허용 개수 (초과하면 COMMENT)
